<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>인세인 GM-less 서포터</title>
    <style>
        /* 화면 전체 디자인 (보내주신 스크린샷 느낌의 다크 테마) */
        body { 
            margin: 0; padding: 0; 
            background-color: #0b0c0c; color: #e0e0e0; 
            font-family: 'Noto Sans KR', sans-serif; 
        }
        header {
            background-color: #121414; padding: 15px 30px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #1f2323;
        }
        .logo { color: #e63946; font-weight: bold; font-size: 20px; }
        
        /* 상단 메뉴(내비게이션) */
        nav button {
            background: none; border: none; color: #8a8f8f;
            padding: 10px 15px; font-size: 15px; cursor: pointer;
        }
        nav button.active { color: #2a9d8f; font-weight: bold; }
        nav button:hover { color: #fff; }

        /* 메인 화면 레이아웃 (본문 + 우측 사이드바) */
        .container { display: flex; padding: 30px; gap: 30px; }
        .main-content { flex: 3; background: #121414; padding: 30px; border-radius: 8px; min-height: 500px; }
        .sidebar { flex: 1; background: #0f1c1a; padding: 20px; border-radius: 8px; border: 1px solid #1b4d3e; height: fit-content; }

        /* 텍스트 입력창 스타일 */
        textarea {
            width: 100%; height: 200px; background: #1a1d1d; color: #fff;
            border: 1px solid #333; padding: 15px; border-radius: 5px; box-sizing: border-box;
            font-size: 14px; line-height: 1.6; resize: none;
        }
        .btn-parse {
            background: #e63946; color: white; border: none; padding: 10px 20px;
            font-size: 16px; border-radius: 5px; cursor: pointer; margin-top: 10px; width: 100%;
        }
        .btn-parse:hover { background: #d62839; }

        /* 주사위 및 진행 도우미 스타일 */
        .sidebar h3 { color: #4ade80; margin-top: 0; font-size: 16px; }
        .dice-box { background: #162a24; padding: 15px; border-radius: 5px; text-align: center; margin-top: 15px; }
        .btn-dice { background: #2a9d8f; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; }
        #dice-result { margin-top: 10px; font-weight: bold; font-size: 18px; color: #4ade80; }
        
        /* 텍스트 줄바꿈 유지 */
        .content-view { white-space: pre-wrap; line-height: 1.8; font-size: 16px; }
    </style>
</head>
<body>

    <header>
        <div class="logo">四誠命 (GM-less)</div>
        <nav>
            <button class="menu-btn active" onclick="switchTab('setting')">설정/입력</button>
            <button class="menu-btn" onclick="switchTab('intro')">개요</button>
            <button class="menu-btn" onclick="switchTab('pc')">PC</button>
            <button class="menu-btn" onclick="switchTab('handout')">핸드아웃</button>
        </nav>
    </header>

    <div class="container">
        <main class="main-content">
            
            <div id="tab-setting" class="tab-pane">
                <h2 style="color: #2a9d8f;">시나리오 텍스트 붙여넣기</h2>
                <p style="color: #8a8f8f; font-size: 14px;">시나리오 원본을 형식에 맞춰 아래에 붙여넣은 후 생성 버튼을 눌러주세요.</p>
                <textarea id="scenarioInput" placeholder="[개요]&#10;여기에 개요 내용을 적으세요...&#10;&#10;[PC]&#10;여기에 PC 정보를 적으세요...&#10;&#10;[핸드아웃]&#10;여기에 핸드아웃 내용을 적으세요..."></textarea>
                <button class="btn-parse" onclick="parseScenario()">시나리오 자동 생성 및 세팅</button>
            </div>

            <div id="tab-intro" class="tab-pane" style="display: none;">
                <h2 style="color: #e63946;">SCENARIO 개요</h2>
                <div id="view-intro" class="content-view">아직 등록된 내용이 없습니다. '설정/입력' 탭에서 시나리오를 먼저 넣어주세요.</div>
            </div>

            <div id="tab-pc" class="tab-pane" style="display: none;">
                <h2>PC 정보</h2>
                <div id="view-pc" class="content-view">아직 등록된 내용이 없습니다.</div>
            </div>

            <div id="tab-handout" class="tab-pane" style="display: none;">
                <h2>핸드아웃 / 비밀</h2>
                <div id="view-handout" class="content-view">아직 등록된 내용이 없습니다.</div>
            </div>

        </main>

        <aside class="sidebar">
            <h3>❓ 시나리오 진행 도우미</h3>
            <hr style="border: 0.5px solid #1b4d3e; margin-bottom: 15px;">
            <label><input type="checkbox"> 핸드아웃 비밀 확인 팝업 뜨기</label><br><br>
            <label><input type="checkbox"> PC 중 누군가 【감정】을 획득함</label>
            
            <div class="dice-box">
                <h4>🎲 인세인 판정 (2D6)</h4>
                <button class="btn-dice" onclick="rollDice()">주사위 굴리기</button>
                <div id="dice-result">-</div>
            </div>
        </aside>
    </div>

    <script>
        // 시나리오 데이터를 저장할 메모리 공간
        let scenarioData = { intro: "", pc: "", handout: "" };

        // 텍스트를 쪼개서 각 메뉴에 배치하는 분석 엔진
        function parseScenario() {
            const rawText = document.getElementById('scenarioInput').value;
            const lines = rawText.split('\n');
            
            let currentSection = "";
            let introText = ""; let pcText = ""; let handoutText = "";

            lines.forEach(line => {
                const trimmed = line.trim();
                
                // 대괄호를 만나면 섹션을 전환합니다.
                if (trimmed === '[개요]') { currentSection = "intro"; return; }
                if (trimmed === '[PC]') { currentSection = "pc"; return; }
                if (trimmed === '[핸드아웃]') { currentSection = "handout"; return; }

                // 해당 섹션에 줄 단위로 글을 쌓습니다.
                if (currentSection === "intro") introText += line + "\n";
                if (currentSection === "pc") pcText += line + "\n";
                if (currentSection === "handout") handoutText += line + "\n";
            });

            // 분석된 데이터를 화면에 적용
            document.getElementById('view-intro').innerText = introText || "내용이 없습니다.";
            document.getElementById('view-pc').innerText = pcText || "내용이 없습니다.";
            document.getElementById('view-handout').innerText = handoutText || "내용이 없습니다.";
            
            alert("시나리오가 성공적으로 분류되었습니다! '개요' 탭을 눌러 확인해 보세요.");
            switchTab('intro'); // 자동으로 개요 탭으로 이동합니다.
        }

        // 상단 메뉴 탭 전환 기능
        function switchTab(tabName) {
            // 모든 탭 숨기기
            document.querySelectorAll('.tab-pane').forEach(el => el.style.display = 'none');
            // 모든 버튼 비활성화 컬러로
            document.querySelectorAll('.menu-btn').forEach(el => el.classList.remove('active'));
            
            // 선택한 탭만 켜기
            document.getElementById('tab-' + tabName).style.style.display = 'block'; // 간혹 브라우저 버그 방지용 코드 수정
            document.getElementById('tab-' + tabName).style.setProperty('display', 'block');
            
            // 클릭한 버튼 활성화
            event.target.classList.add('active');
        }

        // 주사위 굴리기 로직
        function rollDice() {
            const d1 = Math.floor(Math.random() * 6) + 1;
            const d2 = Math.floor(Math.random() * 6) + 1;
            const total = d1 + d2;
            let comment = "";
            if (total === 2) comment = " (펌블!)";
            if (total === 12) comment = " (스페셜!)";
            document.getElementById('dice-result').innerText = `결과: [${d1}, ${d2}] = ${total}${comment}`;
        }
    </script>
</body>
</html>

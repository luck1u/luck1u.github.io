<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>인세인 GM-less 서포터</title>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: #fff; text-align: center; padding: 50px; }
        button { padding: 10px 20px; font-size: 18px; cursor: pointer; background: #8b0000; color: white; border: none; border-radius: 5px; }
        #result { font-size: 24px; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <h1>🎲 인세인 판정 (2D6)</h1>
    <button onclick="rollDice()">주사위 굴리기</button>
    <div id="result">-</div>

    <script>
        function rollDice() {
            const d1 = Math.floor(Math.random() * 6) + 1;
            const d2 = Math.floor(Math.random() * 6) + 1;
            const total = d1 + d2;
            
            let comment = "";
            if (total === 2) comment = " ── 펌블(Fumble)!";
            if (total === 12) comment = " ── 스페셜(Special)!";
            
            document.getElementById('result').innerText = `결과: [${d1}, ${d2}] = ${total}${comment}`;
        }
    </script>
</body>
</html>
